<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - TieBreaker</title>
    <link rel="icon" type="image/png" href="images/tieBreaker.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="login.html" class="back-btn">← Back to Login</a>

    <div class="page-wrapper">
        <div class="card text-center" style="width: 100%; max-width: 500px;">

            <img src="images/tieBreaker.png" alt="TieBreaker Logo"
                style="width: 90px; height: auto; border-radius: 15px; margin-bottom: 20px;">

            <h1 style="color: var(--text-main); margin-bottom: 5px;">Forgot Password?</h1>
            <div class="title-bar title-bar-dark"></div>

            <!-- Under construction notice - uses the shared warning-box style -->
            <div class="warning-box" style="margin: 10px 0 30px 0; width: 100%;">
                <p style="font-size: 18px; font-weight: bold; margin-bottom: 6px;">Under Construction</p>
                <p style="color: #666; font-size: 14px; margin: 0;">Password reset is coming soon.</p>
            </div>

            <div class="divider"></div>
            <p style="color: var(--text-muted);">
                Remember your password?
                <a href="login.html" style="color: var(--green); font-weight: bold; text-decoration: none;">Login here</a>
            </p>
        </div>
    </div>
</body>
</html>
