<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TieBreaker</title>
    <link rel="icon" type="image/png" href="images/tieBreaker.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Home</a>

    <div class="page-wrapper">
        <div class="card" style="width: 100%; max-width: 460px;">

            <h1 style="text-align:center; color: var(--text-main);">Welcome Back!</h1>
            <div class="title-bar title-bar-green"></div>

            <!-- Error message box (hidden until there's an error) -->
            <div id="errorMsg" style="display:none; background:#FEE2E2; color:#B91C1C; padding:12px; border-radius:8px; margin-bottom:15px; font-size:14px;"></div>

            <form id="loginForm">
                <label class="form-label">Username or Email:</label>
                <input type="text" id="identifier" placeholder="Enter username or email"
                    class="form-input" required>

                <label class="form-label">Password:</label>
                <input type="password" id="password" placeholder="Enter your password"
                    class="form-input" required>

                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <label style="font-size:14px; color:var(--text-muted); cursor:pointer;">
                        <input type="checkbox" onchange="document.getElementById('password').type = this.checked ? 'text' : 'password'">
                        Show Password
                    </label>
                    <a href="forgotPassword.html" style="color:var(--text-muted); font-size:14px; text-decoration:none;">
                        Forgot password?
                    </a>
                </div>

                <button type="submit" class="btn btn-green" style="font-size:18px;">Login</button>
            </form>

            <div class="divider"></div>
            <p style="text-align:center; color:var(--text-muted);">
                Don't have an account?
                <a href="register.html" style="color:var(--red); font-weight:bold; text-decoration:none;">Register here</a>
            </p>
        </div>
    </div>

    <script>
        // Shows a red error box instead of a jarring alert popup
        function showError(msg) {
            const box = document.getElementById('errorMsg');
            box.textContent = msg;
            box.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('identifier').value;
            const password   = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('tiebreaker_token', data.token);
                    localStorage.setItem('user_info', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    // Backend sends 'message' for login errors
                    showError(data.message || "Login failed. Please check your credentials.");
                }
            } catch (error) {
                console.error("Connection Error:", error);
                showError("Could not connect to the server. Is your backend running?");
            }
        });
    </script>
</body>
</html>
